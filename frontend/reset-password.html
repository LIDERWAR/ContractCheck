<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый пароль - ContractCheck</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/output.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">`n
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    </head>

<body
    class="bg-brand-dark text-brand-light min-h-screen flex items-center justify-center font-sans selection:bg-brand-orange/30 relative overflow-hidden">

    <!-- Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-brand-orange/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[10%] right-[5%] w-[40%] h-[40%] bg-brand-red/10 rounded-full blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md px-4 relative z-10">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="flex flex-col items-center gap-3 group">
                <img src="images/favicons/logo-icon.png" alt="Logo" class="w-10 h-10 object-contain">
                <span
                    class="text-3xl font-display font-bold text-white transition-colors group-hover:text-brand-orange">
                    ContractCheck
                </span>
            </a>
        </div>

        <!-- Reset Password Card -->
        <div class="glass-card rounded-3xl p-8 md:p-10 animate-fade-in-up">
            <h1 class="text-2xl font-bold text-white mb-2 text-center">Новый пароль</h1>
            <p class="text-gray-400 text-center mb-8 text-sm">Придумайте надежный пароль для вашего аккаунта</p>

            <form class="space-y-5" id="reset-password-form">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-400 mb-2">Новый пароль</label>
                    <input type="password" id="password" required minlength="8"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-brand-orange/50 focus:bg-white/10 transition"
                        placeholder="••••••••">
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-400 mb-2">Подтвердите
                        пароль</label>
                    <input type="password" id="confirm-password" required minlength="8"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-brand-orange/50 focus:bg-white/10 transition"
                        placeholder="••••••••">
                </div>

                <div id="status-message" class="text-sm hidden text-center"></div>

                <button type="submit" id="submit-btn"
                    class="w-full py-3.5 rounded-xl bg-gradient-to-r from-brand-orange to-brand-red text-white font-bold tracking-wide shadow-lg shadow-brand-orange/20 hover:shadow-brand-orange/40 transform hover:-translate-y-0.5 transition duration-200">
                    Сменить пароль
                </button>
            </form>
        </div>

        <div class="text-center mt-6 text-gray-600 text-xs">
            &copy; 2026 ContractCheck. <a href="#" class="hover:text-gray-400">Privacy</a> & <a href="#"
                class="hover:text-gray-400">Terms</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        const token = urlParams.get('token');

        if (!uid || !token) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.textContent = 'Ошибка: недействительная ссылка. Пожалуйста, запросите восстановление заново.';
            statusDiv.className = 'text-red-500 text-sm block text-center mb-4';
            document.getElementById('submit-btn').disabled = true;
        }

        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const statusDiv = document.getElementById('status-message');
            const submitBtn = document.getElementById('submit-btn');

            if (password !== confirmPassword) {
                statusDiv.textContent = 'Пароли не совпадают';
                statusDiv.className = 'text-red-500 text-sm block text-center';
                statusDiv.classList.remove('hidden');
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Применяем...';
                statusDiv.classList.add('hidden');

                await auth.resetPassword(uid, token, password);

                statusDiv.textContent = 'Пароль успешно изменен! Вы будете перенаправлены на страницу входа через 3 секунды...';
                statusDiv.className = 'text-green-400 text-sm block text-center';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (err) {
                statusDiv.textContent = err.message || 'Произошла ошибка. Ссылка могла устареть.';
                statusDiv.className = 'text-red-500 text-sm block text-center';
                statusDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Сменить пароль';
            }
        });
    </script>
</body>

</html>
