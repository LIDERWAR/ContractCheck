<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна - ContractCheck</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/output.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        .glass-premium {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .orange-glow {
            box-shadow: 0 0 40px rgba(255, 140, 66, 0.15);
        }
    </style>
</head>

<body
    class="bg-brand-dark text-brand-light min-h-screen font-sans flex items-center justify-center p-4 overflow-hidden">

    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none -z-10">
        <div
            class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-orange/10 rounded-full blur-[120px] animate-float">
        </div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-brand-red/5 rounded-full blur-[100px] animate-float"
            style="animation-delay: -2s;"></div>
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-brand-orange/[0.02] rounded-full blur-[150px]">
        </div>
    </div>

    <div id="status-container"
        class="max-w-md w-full glass-premium rounded-[40px] p-10 text-center orange-glow animate-success-pop">
        <!-- Checking status state -->
        <div id="checking-state">
            <div class="relative w-24 h-24 mx-auto mb-10">
                <div class="absolute inset-0 bg-brand-orange/20 rounded-full blur-xl animate-pulse"></div>
                <div
                    class="relative w-full h-full border-4 border-brand-orange/30 border-t-brand-orange rounded-full animate-spin">
                </div>
            </div>
            <h1 class="text-3xl font-display font-bold text-white mb-6">Проверяем оплату...</h1>
        </div>

        <!-- Success state (hidden) -->
        <div id="success-state" class="hidden">
            <div class="relative w-24 h-24 mx-auto mb-10">
                <div class="absolute inset-0 bg-green-500/20 rounded-full blur-xl animate-pulse"></div>
                <div
                    class="relative w-full h-full bg-gradient-to-tr from-green-500/20 to-green-500/40 rounded-full flex items-center justify-center border border-green-500/30">
                    <svg class="w-12 h-12 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-display font-bold text-white mb-6">Оплата <span
                    class="bg-gradient-to-r from-brand-orange to-brand-red bg-clip-text text-transparent">прошла
                    успешно</span></h1>
            <p class="text-gray-400 mb-10 text-lg leading-relaxed">Баланс обновлен. Желаем продуктивной работы!</p>
        </div>

        <!-- Canceled/Error state (hidden) -->
        <div id="error-state" class="hidden">
            <div class="relative w-24 h-24 mx-auto mb-10">
                <div class="absolute inset-0 bg-brand-red/20 rounded-full blur-xl animate-pulse"></div>
                <div
                    class="relative w-full h-full bg-gradient-to-tr from-brand-red/20 to-brand-red/40 rounded-full flex items-center justify-center border border-brand-red/30">
                    <svg class="w-12 h-12 text-brand-red" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-display font-bold text-white mb-6">Оплата <span class="text-brand-red">не
                    завершена</span></h1>
            <p class="text-gray-400 mb-10 text-lg leading-relaxed">Похоже, оплата была отменена или возникла ошибка. Вы
                можете попробовать еще раз.</p>
        </div>

        <div class="space-y-4">
            <a href="dashboard.html"
                class="block w-full py-5 bg-gradient-to-r from-brand-orange to-brand-red text-white rounded-2xl font-bold shadow-lg shadow-brand-orange/20 hover:shadow-brand-orange/40 transition-all duration-300 transform hover:-translate-y-1 active:scale-[0.98]">
                Вернуться в кабинет
            </a>
            <a href="index.html"
                class="block w-full py-4 text-gray-500 font-medium hover:text-white transition-colors duration-200">
                На главную
            </a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        async function checkStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            const transactionId = urlParams.get('id');
            const token = localStorage.getItem('cc_token');

            if (!transactionId || !token) {
                document.getElementById('checking-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            try {
                // Poll for status
                let attempts = 0;
                const maxAttempts = 10;

                while (attempts < maxAttempts) {
                    const response = await fetch(`${CC_CONFIG.API_URL}/payment/status/${transactionId}/`, {
                        headers: { 'Authorization': `Token ${token}` }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.status === 'completed') {
                            document.getElementById('checking-state').classList.add('hidden');
                            document.getElementById('success-state').classList.remove('hidden');
                            return;
                        } else if (data.status === 'failed') {
                            document.getElementById('checking-state').classList.add('hidden');
                            document.getElementById('error-state').classList.remove('hidden');
                            return;
                        }
                        // Still pending, wait and retry
                    }

                    attempts++;
                    await new Promise(r => setTimeout(r, 2000));
                }

                // If timed out, show error or neutral message
                document.getElementById('checking-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('checking-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', checkStatus);
    </script>

</body>


</html>
