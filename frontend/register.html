<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - ContractCheck</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/output.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">`n
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://smartcaptcha.yandexcloud.net/captcha.js?render=onload&onload=onSmartCaptchaReady"
        defer></script>
    <script>
        function onSmartCaptchaReady() {
            if (!window.smartCaptcha) {
                return;
            }
            window.smartCaptcha.render('captcha-container', {
                sitekey: 'ysc1_n8NErVKwNoJWKHkfWFOcVGYCCmnh5ZvMLRRbu6nrf693d851',
                hl: 'ru',
            });
        }
    </script>
    <script>
        if (localStorage.getItem('cc_token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</head>

<body
    class="bg-brand-dark text-brand-light min-h-screen flex items-center justify-center font-sans selection:bg-brand-orange/30 relative overflow-hidden">

    <!-- Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-brand-orange/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[10%] right-[5%] w-[40%] h-[40%] bg-brand-red/10 rounded-full blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md px-4 relative z-10">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="flex flex-col items-center gap-3 group">
                <img src="images/favicons/logo-icon.png" alt="Logo" class="w-10 h-10 object-contain">
                <span
                    class="text-3xl font-display font-bold text-white transition-colors group-hover:text-brand-orange">
                    ContractCheck
                </span>
            </a>
        </div>

        <!-- Register Card -->
        <div class="glass-card rounded-3xl p-8 md:p-10 animate-fade-in-up">
            <h1 class="text-2xl font-bold text-white mb-2 text-center">Создать аккаунт</h1>
            <p class="text-gray-400 text-center mb-8 text-sm">Начните проверять договоры с ИИ уже сегодня</p>

            <form class="space-y-5" id="register-form">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-400 mb-2">Логин
                        (необязательно)</label>
                    <input type="text" id="username"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-brand-orange/50 focus:bg-white/10 transition"
                        placeholder="Ваш уникальный никнейм">
                    <p class="text-[10px] text-gray-500 mt-1">Если не заполнить, логином будет ваш Email</p>
                </div>

                <!-- Honeypot field (hidden from humans) -->
                <div style="position: absolute; left: -9999px;">
                    <input type="text" id="middle_name" name="middle_name" tabindex="-1" autocomplete="off">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-400 mb-2">Email</label>
                    <input type="email" id="email" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-brand-orange/50 focus:bg-white/10 transition"
                        placeholder="name@company.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-400 mb-2">Пароль</label>
                    <div class="relative">
                        <input type="password" id="password" required
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-brand-orange/50 focus:bg-white/10 transition pr-10"
                            placeholder="••••••••">
                        <button type="button"
                            class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-white"
                            onclick="togglePassword('password', this)">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-400 mb-2">Подтвердите
                        пароль</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" required
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-brand-orange/50 focus:bg-white/10 transition pr-10"
                            placeholder="••••••••">
                        <button type="button"
                            class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-white"
                            onclick="togglePassword('confirm-password', this)">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="error-message" class="text-red-500 text-sm hidden text-center"></div>

                <div id="captcha-container" class="smart-captcha mb-4"></div>

                <button type="submit"
                    class="w-full py-3.5 rounded-xl bg-gradient-to-r from-brand-orange to-brand-red text-white font-bold tracking-wide shadow-lg shadow-brand-orange/20 hover:shadow-brand-orange/40 transform hover:-translate-y-0.5 transition duration-200">
                    Зарегистрироваться
                </button>
            </form>

            <script src="js/config.js"></script>
            <script src="js/auth.js"></script>

            <script>
                document.getElementById('register-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const username = document.getElementById('username')?.value || '';
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirm-password').value;
                    const errorDiv = document.getElementById('error-message');

                    if (password !== confirmPassword) {
                        errorDiv.textContent = 'Пароли не совпадают';
                        errorDiv.classList.remove('hidden');
                        return;
                    }

                    try {
                        errorDiv.classList.add('hidden');
                        const middle_name = document.getElementById('middle_name').value;
                        const smartToken = document.querySelector('input[name="smart-token"]')?.value;

                        // Если логин пустой, используем email (это произойдет в auth.register)
                        await auth.register(email, password, username, {
                            middle_name,
                            'smart-token': smartToken
                        });
                    } catch (err) {
                        errorDiv.textContent = err.message;
                        errorDiv.classList.remove('hidden');
                    }
                });


            </script>


            <p class="text-center text-gray-500 text-xs mt-8">
                Уже есть аккаунт? <a href="login.html" class="text-brand-orange hover:text-white transition">Войти</a>
            </p>
        </div>

        <div class="text-center mt-6 text-gray-600 text-xs">
            &copy; 2026 ContractCheck. <a href="#" class="hover:text-gray-400">Privacy</a> & <a href="#"
                class="hover:text-gray-400">Terms</a>
        </div>

    </div>

</body>

</html>
