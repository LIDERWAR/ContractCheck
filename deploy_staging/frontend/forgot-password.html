<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - ContractCheck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Unbounded', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#FF8C42',
                            red: '#FF2E2E',
                            dark: '#050505',
                            card: '#0A0A0B',
                            light: '#E2E2E2'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-brand-dark text-brand-light min-h-screen flex items-center justify-center font-sans selection:bg-brand-orange/30 relative overflow-hidden">

    <!-- Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-brand-orange/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[10%] right-[5%] w-[40%] h-[40%] bg-brand-red/10 rounded-full blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md px-4 relative z-10">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="flex flex-col items-center gap-3 group">
                <span
                    class="text-3xl font-display font-bold text-white transition-colors group-hover:text-brand-orange">
                    ContractCheck
                </span>
            </a>
        </div>

        <!-- Forgot Password Card -->
        <div class="glass-card rounded-3xl p-8 md:p-10 animate-fade-in-up">
            <h1 class="text-2xl font-bold text-white mb-2 text-center">Забыли пароль?</h1>
            <p class="text-gray-400 text-center mb-8 text-sm">Введите ваш Email, и мы отправим ссылку для восстановления
            </p>

            <form class="space-y-5" id="forgot-password-form">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-400 mb-2">Email</label>
                    <input type="email" id="email" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-brand-orange/50 focus:bg-white/10 transition"
                        placeholder="name@company.com">
                </div>

                <div id="status-message" class="text-sm hidden text-center"></div>

                <button type="submit" id="submit-btn"
                    class="w-full py-3.5 rounded-xl bg-gradient-to-r from-brand-orange to-brand-red text-white font-bold tracking-wide shadow-lg shadow-brand-orange/20 hover:shadow-brand-orange/40 transform hover:-translate-y-0.5 transition duration-200">
                    Отправить ссылку
                </button>
            </form>

            <p class="text-center text-gray-500 text-xs mt-8">
                Вспомнили пароль? <a href="login.html" class="text-brand-orange hover:text-white transition">Вернуться
                    ко входу</a>
            </p>
        </div>

        <div class="text-center mt-6 text-gray-600 text-xs">
            &copy; 2026 ContractCheck. <a href="#" class="hover:text-gray-400">Privacy</a> & <a href="#"
                class="hover:text-gray-400">Terms</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusDiv = document.getElementById('status-message');
            const submitBtn = document.getElementById('submit-btn');

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Отправка...';
                statusDiv.classList.add('hidden');

                await auth.forgotPassword(email);

                statusDiv.textContent = 'Ссылка отправлена! Проверьте вашу почту.';
                statusDiv.className = 'text-green-400 text-sm block text-center';
                document.getElementById('forgot-password-form').reset();
            } catch (err) {
                statusDiv.textContent = err.message || 'Произошла ошибка. Попробуйте снова.';
                statusDiv.className = 'text-red-500 text-sm block text-center';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Отправить ссылку';
            }
        });
    </script>
</body>

</html>
