<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка оплаты - ContractCheck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Unbounded', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#FF8C42',
                            red: '#FF2E2E',
                            dark: '#050505',
                            card: '#0A0A0B',
                            light: '#E2E2E2'
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'fade-up': 'fade-up 0.5s ease-out both',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
                        },
                        'fade-up': {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-error {
            background: rgba(255, 46, 46, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .red-glow {
            box-shadow: 0 0 40px rgba(255, 46, 46, 0.1);
        }
    </style>
</head>

<body
    class="bg-brand-dark text-brand-light min-h-screen font-sans flex items-center justify-center p-4 overflow-hidden">

    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none -z-10">
        <div
            class="absolute top-[10%] right-[10%] w-[40%] h-[40%] bg-brand-red/5 rounded-full blur-[120px] animate-float">
        </div>
        <div class="absolute bottom-[10%] left-[10%] w-[40%] h-[40%] bg-brand-orange/5 rounded-full blur-[100px] animate-float"
            style="animation-delay: -3s;"></div>
    </div>

    <div class="max-w-md w-full glass-error rounded-[40px] p-10 text-center red-glow animate-fade-up">
        <!-- Error Icon -->
        <div class="relative w-24 h-24 mx-auto mb-10 animate-shake" style="animation-delay: 0.5s;">
            <div class="absolute inset-0 bg-brand-red/20 rounded-full blur-xl animate-pulse"></div>
            <div
                class="relative w-full h-full bg-gradient-to-tr from-brand-red/20 to-brand-red/40 rounded-full flex items-center justify-center border border-brand-red/30">
                <svg class="w-12 h-12 text-brand-red" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-display font-bold text-white mb-6 tracking-tight">
            Оплата <span class="text-brand-red">не прошла</span>
        </h1>

        <p class="text-gray-400 mb-10 text-lg leading-relaxed">
            К сожалению, средства не были списаны. Пожалуйста, проверьте баланс карты или попробуйте другой способ
            оплаты.
        </p>

        <div class="space-y-4">
            <a href="index.html#pricing"
                class="block w-full py-5 bg-white/5 hover:bg-white/10 text-white rounded-2xl font-bold border border-white/10 transition-all duration-300 transform hover:-translate-y-1 active:scale-[0.98]">
                Попробовать еще раз
            </a>

            <a href="dashboard.html"
                class="block w-full py-4 text-gray-500 font-medium hover:text-white transition-colors duration-200">
                Вернуться в кабинет
            </a>
        </div>

        <div class="mt-12 pt-8 border-t border-white/5">
            <p class="text-sm text-gray-500 flex flex-col gap-2">
                Нужна помощь? Свяжитесь с нами:
                <a href="https://t.me/contractcheck_support"
                    class="text-brand-orange hover:text-white transition-colors font-semibold">Наш Telegram-бот</a>
            </p>
        </div>
    </div>

    <div class="mt-8 flex flex-wrap justify-center gap-4 text-[10px] text-gray-600 uppercase font-bold tracking-widest">
        <a href="user-agreement.html" class="hover:text-brand-orange transition">Оферта</a>
        <a href="privacy-policy.html" class="hover:text-brand-orange transition">Политика</a>
        <a href="requisites.html" class="hover:text-brand-orange transition">Реквизиты</a>
    </div>

</body>

</html>
