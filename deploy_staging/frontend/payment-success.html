<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна - ContractCheck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/custom.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Unbounded', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#FF8C42',
                            red: '#FF2E2E',
                            dark: '#050505',
                            card: '#0A0A0B',
                            light: '#E2E2E2'
                        }
                    },
                    animation: {
                        'shimmer': 'shimmer 2s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'success-pop': 'success-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        'success-pop': {
                            '0%': { transform: 'scale(0.5)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-premium {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .orange-glow {
            box-shadow: 0 0 40px rgba(255, 140, 66, 0.15);
        }
    </style>
</head>

<body
    class="bg-brand-dark text-brand-light min-h-screen font-sans flex items-center justify-center p-4 overflow-hidden">

    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none -z-10">
        <div
            class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-orange/10 rounded-full blur-[120px] animate-float">
        </div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-brand-red/5 rounded-full blur-[100px] animate-float"
            style="animation-delay: -2s;"></div>
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-brand-orange/[0.02] rounded-full blur-[150px]">
        </div>
    </div>

    <div class="max-w-md w-full glass-premium rounded-[40px] p-10 text-center orange-glow animate-success-pop">
        <!-- Success Icon -->
        <div class="relative w-24 h-24 mx-auto mb-10">
            <div class="absolute inset-0 bg-green-500/20 rounded-full blur-xl animate-pulse"></div>
            <div
                class="relative w-full h-full bg-gradient-to-tr from-green-500/20 to-green-500/40 rounded-full flex items-center justify-center border border-green-500/30">
                <svg class="w-12 h-12 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"
                        class="animate-[draw-check_0.6s_ease-in-out_forwards]"
                        style="stroke-dasharray: 50; stroke-dashoffset: 50;"></path>
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-display font-bold text-white mb-6 tracking-tight">
            Оплата <span class="bg-gradient-to-r from-brand-orange to-brand-red bg-clip-text text-transparent">прошла
                успешно</span>
        </h1>

        <p class="text-gray-400 mb-10 text-lg leading-relaxed">
            Ваш баланс обновлен. Мы уже подключили все возможности вашего нового тарифа.
        </p>

        <div class="space-y-4">
            <a href="dashboard.html"
                class="block w-full py-5 bg-gradient-to-r from-brand-orange to-brand-red text-white rounded-2xl font-bold shadow-lg shadow-brand-orange/20 hover:shadow-brand-orange/40 transition-all duration-300 transform hover:-translate-y-1 active:scale-[0.98]">
                Вернуться в кабинет
            </a>

            <a href="index.html"
                class="block w-full py-4 text-gray-500 font-medium hover:text-white transition-colors duration-200">
                На главную
            </a>
        </div>

        <div class="mt-12 pt-8 border-t border-white/5">
            <p class="text-sm text-gray-500">
                Возникли вопросы? Напишите нам в
                <a href="mailto:support@contractcheck.ru"
                    class="text-brand-orange hover:text-white transition-colors font-semibold">поддержку</a>
            </p>
        </div>
        <div
            class="mt-8 flex flex-wrap justify-center gap-4 text-[10px] text-gray-600 uppercase font-bold tracking-widest">
            <a href="user-agreement.html" class="hover:text-brand-orange transition">Оферта</a>
            <a href="privacy-policy.html" class="hover:text-brand-orange transition">Политика</a>
            <a href="requisites.html" class="hover:text-brand-orange transition">Реквизиты</a>
        </div>
    </div>

</body>

</html>
